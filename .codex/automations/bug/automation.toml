version = 1
id = "bug"
kind = "cron"
name = "Bug每小时巡检"
prompt = """
你需要对当前仓库执行每小时缺陷巡检，但这是缺陷台账维护任务，不是代码修复任务。

目标：
- 发现当前仍存在、或状态刚发生变化的缺陷
- 优先巡检最近一小时真实会话中的异常表现，而不只看代码提交
- 更深入识别 AI 返回不及预期、结构或格式有问题、返回质量不佳、链路降级或功能异常
- 维护 `docs/bugs/` 下的缺陷文档
- 不修改任何业务代码、测试代码、配置代码

允许的信息来源，按优先级从高到低：
- 最近一小时的会话记录与消息落库，优先看 `data/sessions.sqlite3`
  - 可优先利用 `sessions.updated_at`、`sessions.last_message_at`
  - 以及 `session_messages.timestamp`、`session_messages.imported_at`
- 最近一小时的运行日志，优先看 `data/runtime/logs/*.log` 与 `data/logs/*.log`
- 最近的非文档代码提交
- 当前仓库中的 bug 文档与相关设计/约束文档

执行顺序：
- 默认先从“最近一小时”开始巡检真实会话与日志
- 只有在需要确认根因、判断是否为已知缺陷、或确认是否已修复时，才回溯更早的提交与历史文档
- 对每个候选问题，先判断它属于“功能性 bug”还是“质量性 bug”，再决定是否建档或更新原档

巡检重点：
- 用户明确提出的任务是否被完成，是否出现答非所问、漏答、明显误解或关键信息遗漏
- AI 返回结构是否损坏，例如 Markdown、表格、列表、JSON、卡片、代码块、富文本被截断、闭合错误、原始标签外泄、格式退化
- 输出是否出现不该暴露的内部实现细节、原始报错、工具中间稿、思维痕迹、污染文本
- 工具调用后是否没有正确消费结果，或总结缺失、结论偏离、返回内容明显低于上下文要求
- 是否出现回复语言、语气、角色、时间口径、格式要求明显偏离用户要求
- 是否存在链路级异常，例如未回复、重复回复、发错对象、回复中断、严重延迟、会话状态错乱、工具或 runner 失败、渠道投递异常

输出规则：
- 所有缺陷文档都放在 `docs/bugs/`
- 先搜索 `docs/bugs/*.md`，避免重复建档
- 如果同一根因、同一链路、同一影响范围的缺陷已经存在：
  - 仅在证据更新、严重级别变化、状态变化时更新原文档
  - 不要新建第二份重复文档
- 只有当确认是新的根因或新的独立受影响链路时，才允许新建文档
- 对质量类问题，必须附带具体会话证据，例如 session_id、时间窗、消息摘要或日志时间点；不要只写主观感受

缺陷分类白名单：
- `Bug Type`: `System Error` 或 `Business Error`
- `Severity`: `P0`、`P1`、`P2`、`P3`
- `Status`: `New`、`Approved`、`Fixing`、`Fixed`、`Closed`

文档结构必须包含：
- 标题
- 发现时间
- Bug Type
- 严重等级
- 状态
- 证据来源
- 端到端链路
- 期望效果
- 当前实现效果
- 用户影响
- 根因判断
- 下一步建议

判定标准：
- 优先关注当前仍可能影响用户的问题
- 先判断是否真的构成 bug；必须基于真实会话、日志、代码或已有文档证据，不要只凭猜测建档
- 只要影响功能链路、正确性、稳定性、数据安全、消息投递，或导致用户无法完成任务，可按 `P0`、`P1`、`P2`
- 如果问题主要表现为 AI 返回不及预期、结构或格式有问题、内容质量不佳、总结偏浅、表达不好，但不影响主功能链路，也没有造成错误投递、数据错误或系统失败，一律按 `P3`
- 当登记 `P3` 时，文档中必须明确写出“为何不影响功能链路，因此定级为 P3”
- 如果某个问题已经被代码修复，只允许更新已有文档状态为 `Fixed` 或 `Closed`，不要重新登记为 `New`
- 如果只是单次轻微波动、证据不足，或更像主观偏好差异，不要建档

Git 规则：
- 只允许修改 `docs/bugs/` 下相关文档
- 开始前先检查工作区；如果不干净，不要直接跳过，而是先查看具体脏文件和 diff，判断哪些属于本任务、哪些不属于本任务
- 对于不属于本任务的本地改动，先在安全前提下清理工作区：恢复已跟踪文件、删除本任务无关的未跟踪文件，然后再继续本轮巡检
- 对于本任务自己将要更新的 `docs/bugs/` 文档，可以正常保留并继续
- 只允许使用普通非破坏性 Git 命令，包括 `git add`、`git commit`、`git push`、`git fetch`、`git pull --rebase`、`git rebase`
- 如果 push 失败，先抓取远端最新 `main`，把本轮提交 rebase 到远端最新提交之后，再继续 push
- 如果 rebase 或 push 过程中出现冲突，不要直接停止；应查看冲突文件，保留双方都成立的修改，解决冲突后继续 rebase 或 push
- 解决冲突后，必须再次确认最终内容仍符合“只维护 `docs/bugs/`”这条任务边界，再完成提交与推送
- 不要强推，不要改 `main` 历史

提交规则：
- 只有在 `docs/bugs/` 实际发生变化时才提交
- 如果没有新增或更新任何缺陷文档，不要提交空 commit
- 若有更新，提交并推送到远端 `main`
- 若无更新，直接结束，不要制造额外文件
"""
status = "ACTIVE"
rrule = "RRULE:FREQ=HOURLY;INTERVAL=1;BYMINUTE=0;BYDAY=SU,MO,TU,WE,TH,FR,SA"
model = "gpt-5.4"
reasoning_effort = "medium"
execution_environment = "local"
cwds = ["/Users/ecohnoch/Desktop/honeclaw"]
