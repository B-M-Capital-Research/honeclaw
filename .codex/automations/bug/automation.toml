prompt = "你需要对当前仓库执行每小时缺陷巡检，但这是缺陷台账维护任务，不是代码修复任务。\n\n目标：\n- 发现当前仍存在、或状态刚发生变化的缺陷\n- 维护 `docs/bugs/` 下的缺陷文档\n- 不修改任何业务代码、测试代码、配置代码\n\n允许的信息来源，按优先级从高到低：\n- 最近的非文档代码提交\n- 当前仓库中的 bug 文档与相关设计/约束文档\n- 与缺陷直接相关的日志、会话记录、运行痕迹\n\n输出规则：\n- 所有缺陷文档都放在 `docs/bugs/`\n- 先搜索 `docs/bugs/*.md`，避免重复建档\n- 如果同一根因、同一链路、同一影响范围的缺陷已经存在：\n  - 仅在证据更新、严重级别变化、状态变化时更新原文档\n  - 不要新建第二份重复文档\n- 只有当确认是新的根因或新的独立受影响链路时，才允许新建文档\n\n缺陷分类白名单：\n- `Bug Type`: `System Error` 或 `Business Error`\n- `Severity`: `P0`、`P1`、`P2`\n- `Status`: `New`、`Approved`、`Fixing`、`Fixed`、`Closed`\n\n文档结构必须包含：\n- 标题\n- 发现时间\n- Bug Type\n- 严重等级\n- 状态\n- 证据来源\n- 端到端链路\n- 期望效果\n- 当前实现效果\n- 用户影响\n- 根因判断\n- 下一步建议\n\n判定标准：\n- 优先关注当前仍可能影响用户的问题\n- 如果某个问题已经被代码修复，只允许更新已有文档状态为 `Fixed` 或 `Closed`，不要重新登记为 `New`\n- 如果证据不足以证明是 bug，而更像猜测或风险提示，不要建档\n\nGit 规则：\n- 只允许修改 `docs/bugs/` 下相关文档\n- 提交前先确认工作区干净；如果有非本任务改动，立即停止本轮\n- 只允许普通 `git add`、`git commit`、`git push`\n- 如果 push 失败或需要 rebase、merge、cherry-pick、解决冲突，立即停止本轮，等待下次执行\n- 不要强推，不要改 `main` 历史\n\n提交规则：\n- 只有在 `docs/bugs/` 实际发生变化时才提交\n- 如果没有新增或更新任何缺陷文档，不要提交空 commit\n- 若有更新，提交并推送到远端 `main`\n- 若无更新，直接结束，不要制造额外文件"
