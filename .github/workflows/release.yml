name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --workspace --bins --target ${{ matrix.target }}

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          PKG_NAME="honeclaw-${{ github.ref_name }}-${{ matrix.target }}"
          BIN_DIR="target/${{ matrix.target }}/release"
          PKG_DIR="dist/${PKG_NAME}"
          mkdir -p "${PKG_DIR}/bin" "${PKG_DIR}/share/honeclaw"
          for bin in hone-cli hone-console-page hone-imessage hone-telegram hone-discord hone-feishu hone-mcp; do
            if [ -f "${BIN_DIR}/${bin}" ]; then
              cp "${BIN_DIR}/${bin}" "${PKG_DIR}/bin/"
            fi
          done
          cp README.md "${PKG_DIR}/share/honeclaw/"
          cp LICENSE "${PKG_DIR}/share/honeclaw/"
          cp CONTRIBUTING.md "${PKG_DIR}/share/honeclaw/"
          cp SECURITY.md "${PKG_DIR}/share/honeclaw/"
          cp CODE_OF_CONDUCT.md "${PKG_DIR}/share/honeclaw/"
          cp config.example.yaml "${PKG_DIR}/share/honeclaw/"
          cp soul.md "${PKG_DIR}/share/honeclaw/"
          cp -R skills "${PKG_DIR}/share/honeclaw/skills"

          case "${{ matrix.target }}" in
            aarch64-apple-darwin) ASSET_NAME="honeclaw-darwin-aarch64.tar.gz" ;;
            x86_64-apple-darwin) ASSET_NAME="honeclaw-darwin-x86_64.tar.gz" ;;
            x86_64-unknown-linux-gnu) ASSET_NAME="honeclaw-linux-x86_64.tar.gz" ;;
            *)
              echo "unsupported release asset target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac

          tar -czf "dist/${ASSET_NAME}" -C dist "${PKG_NAME}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            scripts/install_hone_cli.sh
