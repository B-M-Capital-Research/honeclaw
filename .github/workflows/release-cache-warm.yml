name: Release Cache Warm

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
      - ".github/workflows/release-cache-warm.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/**"
      - "agents/**"
      - "bins/**"
      - "crates/**"
      - "memory/**"
  workflow_dispatch:

concurrency:
  group: release-cache-warm-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  warm-release-cache:
    name: warm-release-cache (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-targets: "true"
          cache-workspace-crates: "true"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --target "${{ matrix.target }}" \
            --package hone-cli \
            --package hone-console-page \
            --package hone-imessage \
            --package hone-telegram \
            --package hone-discord \
            --package hone-feishu \
            --package hone-mcp

      - name: Show sccache stats
        if: always()
        shell: bash
        run: ${SCCACHE_PATH} --show-stats || true
