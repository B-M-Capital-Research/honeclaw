name: Secret Scan

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gacts/gitleaks@v1
        with:
          version: latest
          config-path: gitleaks.toml
          path: .
