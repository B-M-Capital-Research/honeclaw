name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-checks-ubuntu
          cache-targets: "true"
          cache-workspace-crates: "true"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Rust format check (changed files)
        run: bash scripts/ci/check_fmt_changed.sh

      - name: Rust compile check
        run: cargo check --workspace --all-targets --exclude hone-desktop

      - name: Rust tests
        run: cargo test --workspace --all-targets --exclude hone-desktop

      - name: CI-safe regression scripts
        run: bash tests/regression/run_ci.sh

      - name: Show sccache stats
        if: always()
        shell: bash
        run: ${SCCACHE_PATH} --show-stats || true

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Frontend unit tests
        run: bun run test:web
