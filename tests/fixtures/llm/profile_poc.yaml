llm:
  providers:
    openrouter:
      kind: openai_compatible
      base_url: https://openrouter.ai/api/v1
      api_key_env: OPENROUTER_API_KEY
      timeout: 60
      max_retries: 1

  profiles:
    poc_reasoning_json:
      provider: openrouter
      model: x-ai/grok-4.1-fast
      params:
        max_tokens: 256
        temperature: 0
        reasoning:
          effort: low
        response_format:
          type: json_object
