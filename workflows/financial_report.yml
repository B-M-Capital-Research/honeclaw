        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: google/gemini-3.1-pro-preview
          provider: openai_api_compatible
        prompt_template:
        - id: 47e1b8f6-cb33-4552-92d8-0832260714bb
          role: system
          text: "根据提供的公司名称、公司基础信息、公司年报解读等信息，撰写一份专业且有效的产品和技术分析报告。注意当前时间为{{#1742573007628.text#}}。\n\
            \n\n注意，尽量详细且全面，多列一些表格。\n\n\n请按照以下步骤和输出格式完成任务：\n\n\n步骤：\n\n\n1. **理解输入信息**：仔细阅读并理解提供的公司名称、基础信息和年报解读内容。确保对公司的业务模式、产品线、技术优势和市场定位有清晰的认识。\n\
            \n\n2. **分析产品和技术**：基于输入信息，分析公司的核心产品和技术。重点关注产品的创新性、技术的前沿性、市场竞争力以及未来的发展潜力。\n\
            \n\n3. **撰写报告**：撰写一份结构清晰、内容详实的产品和技术分析报告。报告应包括以下部分：\n   - **产品分析**：详细分析公司的核心产品，包括产品特点、技术优势、市场表现等。\n\
            \   - **技术分析**：深入探讨公司所采用的技术，包括技术的创新性、应用场景、竞争优势等。\n   - **未来展望**：基于当前的产品和技术，以及近期的重要科研成果，预测公司未来的发展方向和潜在机会。\n\
            \n\n4. **输出格式**：确保报告内容简洁明了，避免使用任何XML标签。报告应该便于阅读和理解，格式参考：\n\n\n---\n\n\n\
            ## 2. 公司产品及技术和商业模式\n\n\n### 2.1 公司现有的产品全面介绍\n\n\n详细数量，每个产品线的产品介绍，多列一些表格和因果关系。\n\
            \n\n### 2.2 产品线的增长速度和未来发展趋势\n\n\n详细介绍增长速度和未来趋势，多列一些表格和因果关系\n\n\n### 2.3\
            \ 背后的商业模式是什么\n\n\n详细介绍（例如平台模式、服务模式等），多列一些表格和因果关系，并且如果有，可以详细介绍关联和协同效应如何体现？多列一些表格和因果关系\n\
            \n\n#### 2.4 可以套用Kano理论进行分析\n\n\n多列一些表格和因果关系\n---\n\n\n请确保报告内容准确、专业，并基于提供的输入信息进行撰写。\n\
