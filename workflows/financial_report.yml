            \ \n## 5.估值分析\n### 5.1. 公司基础信息与市场指标\n1.1 公司简介\n* 注册地／上市地点／成立年份\n* 主营业务及收入占比\n\
            * 最新股价／总市值／流通市值\n* TTM P/E、P/B、PS、EV/EBITDA\n* 控股股东、实际控制人及持股比例\n* 重要事项：限售股解禁、增减持、重大诉讼、并购或战略合作\n\
            1.2 战略合作与项目进展\n* 最新合作：如固态电池、上下游原料或科技平台合作\n* 进展阶段：框架协议→设备调试→试产→批量生产→装车应用\n\
            * 预期贡献：短期（1–2年）／中期（3–5年）新增收入与利润\n1.3 同行可比\n* 列出 3–5 家可比公司（公司名、代码、业务）\n\
            * 对比关键估值倍数：P/E、PS、EV/Sales、EV/EBITDA、PEG\L────────────────────────\n###\
            \ 5.2. 核心假设与外部环境\n* 新产品/项目规划：产能扩张、新基地、关键装备或技术升级\n* 战略合作：合作方、合作模式、量产节奏、毛利率假设\n\
            * 政策/监管变化：补贴退出／延续、税收优惠、行业准入、碳中和政策\n* 宏观环境假设：行业销量增速、原材料价格波动、汇率、中美/欧贸易政策\n\
            * 资本开支与激励：3–5年CapEx规模；股权激励、期权计划对摊薄的影响\L────────────────────────\n### 5.3.\
            \ 估值分析框架\n1. 发展阶段与增长率假设\n* 阶段判断：高速增长／成熟／转型，说明依据（营收、利润、ROE趋势）\n* 增速假设：\n\
            \    1. 短期（1年）：管理层指引或研报预测\n    2. 中期（3年）：券商共识＋行业CAGR\n    3. 长期（5年及以后）：生命周期模型推断\n\
            2. 外部预测与管理层指引\n* 摘录最新财报／公告中的业绩预期（含发布日期）\n* 分析师共识：收入、净利润、ROE、EPS等预测区间\n\
            3. 主营业务（第一曲线）预测拆分\n* 拆分要素：销量×均价×毛利率；费用率（销、管、研）\n* 1/3/5年：分别给出营收和净利润预测\n\
            4. 战略合作／新业务（第二曲线）预测拆分\n* 合作或新业务：市场空间、渗透率、产能节奏、毛利率\n* 贡献预测：3/5年内新增营收与净利润\n\
            5. 场景与敏感性分析\n* 基准／乐观／悲观三种情境，核心变量（销量、价格、毛利率、合作进度）变化对业绩影响\n* 敏感性：变量±10%/±20%下的估值区间\n\
            6. 多方法估值结合\n* 成熟业务估值：P/E、EV/EBITDA、DCF\n* 成长或新业务估值：EV/Sales、PS、SoTP分部估值\n\
            * 估值倍数选取依据：行业中位、历史区间、风险溢价⁄折价\n7 .估值结论与风险提示\n* 时点说明：截至{{#timestamp#}}的股价、市值、主要倍数\n\
            * 估值区间：低估／合理／高估判断及中枢价格\n* 主要风险：政策、市场竞争、原材料、合作进度、执行风险、宏观波动\n────────────────────────\n\
            使用须知：\n* 每次运行按“数据来源优先级”自动检索并分析原文（含链接与发布日期）\n* 关键公式：\n    * Revenueₜ =\
            \ Revenueₜ₋₁ × (1 + Growthₜ)\n    * NetProfitₜ = Revenueₜ × 净利率ₜ\n   \
            \ * DCF = 折现(FCF₁…FCFₙ) + Terminal Value\n* 输出语言：中文，务必注明所有数据来源链接。\n————————————"
