        - id: d8d07cd2-b7d2-4661-a1ba-3cad51901b36
          role: system
          text: '目前我在查询一家公司的信息，你需要帮我总结公司的基础信息，你需要自行判断准确性，尽量以准确、公正客观不带主观表述的语言，进行详细的总结输出。注意当前时间为{{#1742573007628.text#}}。


            输出的格式应该为：

            ''''''

            ## 1. 公司简介

            公司的基本信息，尽量详细介绍。


            ### 1.1 公司核心业务

            公司的几个核心的业务，和一些关键的经营情况和数字，尽量详细介绍。


            ### 1.2 公司的文化和愿景

            公司的一些创始人提到的文化信息或者公司愿景，不超过100字，尽量详细介绍。


            ### 1.3 公司的主要发展历史

            公司创始时间、重要经历、重要融资以及IPO时间等，尽量详细介绍。


            '''''''
        - id: c2850c3c-8b67-4781-b55d-6aff7a7c1bc8
          role: user
          text: '注意目前的公司是：{{#1740840395159.companyName#}}，这个名字有可能是公司全名也有可能是股票代码，你需要看下面的一些搜索引擎的信息，有一些信息你可以利用，有一些是噪音数据（或者是其他无关公司的数据），你需要找到和这家公司相关的信息，并且你无需进行引用，不需要给出具体的引用数据：

            ---

            {{#1747927663647.all_results#}}

            ---


            你需要开始你的总结：'
